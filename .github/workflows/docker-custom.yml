name: Docker Custom (LacyHQ)

on:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/docker-custom.yml"

concurrency:
  group: docker-custom-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:lacyhq
          build-args: |
            OPENCLAW_VARIANT=default
            OPENCLAW_DOCKER_APT_PACKAGES=
            OPENCLAW_INSTALL_BROWSER=1
            OPENCLAW_EXTENSIONS=matrix memory-lancedb
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
